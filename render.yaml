services:
  - type: web
    name: driver-login
    runtime: python
    plan: free
    buildCommand: python --version && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: driver-login-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: driver-login-db
    plan: free
    databaseName: driver_login
