{% extends "base.html" %}

{% block content %}
<section class="login-screen">
    <div class="login-bg" aria-hidden="true">
        <svg class="bg-pattern" viewBox="0 0 800 1200" preserveAspectRatio="xMidYMid slice">
            <defs>
                <pattern id="mapGrid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
                    <path d="M56 0H0v56" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                </pattern>
                <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
                    <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
                    <stop offset="100%" stop-color="rgba(0,0,0,0.45)"/>
                </radialGradient>
            </defs>

            <rect width="800" height="1200" fill="url(#mapGrid)"/>

            <g class="contours" opacity="0.16">
                <path d="M-20 140 Q200 90 420 150 T820 160" stroke="#ffffff" stroke-width="1.2" fill="none"/>
                <path d="M-20 195 Q200 145 420 205 T820 215" stroke="#ffffff" stroke-width="1" fill="none"/>
                <path d="M-20 250 Q200 200 420 260 T820 270" stroke="#ffffff" stroke-width="0.8" fill="none"/>
                <path d="M-20 760 Q200 720 420 770 T820 780" stroke="#ffffff" stroke-width="1" fill="none"/>
                <path d="M-20 820 Q200 780 420 830 T820 840" stroke="#ffffff" stroke-width="1.2" fill="none"/>
                <path d="M-20 880 Q200 840 420 890 T820 900" stroke="#ffffff" stroke-width="0.8" fill="none"/>
            </g>

            <g class="route-set">
                <path class="route route-a" d="M40 200 Q220 120 420 240 T780 320" stroke="#fbbf24" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-dasharray="10 8"/>
                <path class="route route-b" d="M50 540 Q260 460 500 580 T780 660" stroke="#22d3ee" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-dasharray="8 10"/>
                <path class="route route-c" d="M30 900 Q240 820 480 940 T780 980" stroke="#f97316" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-dasharray="12 8"/>
                <path class="route route-d" d="M120 80 Q300 200 540 140 T760 220" stroke="rgba(255,255,255,0.35)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-dasharray="6 10"/>
            </g>

            <g class="markers">
                <g class="marker m-1" transform="translate(40 200)">
                    <circle class="ring ring-1" r="6" fill="none" stroke="#fbbf24" stroke-width="1.6"/>
                    <circle class="ring ring-2" r="6" fill="none" stroke="#fbbf24" stroke-width="1.6"/>
                    <circle r="4.5" fill="#fbbf24"/>
                    <circle r="1.6" fill="#0f172a"/>
                </g>
                <g class="marker m-2" transform="translate(780 320)">
                    <circle class="ring ring-1" r="6" fill="none" stroke="#fbbf24" stroke-width="1.6"/>
                    <circle r="4.5" fill="#fbbf24"/>
                    <circle r="1.6" fill="#0f172a"/>
                </g>
                <g class="marker m-3" transform="translate(50 540)">
                    <circle class="ring ring-1" r="6" fill="none" stroke="#22d3ee" stroke-width="1.6"/>
                    <circle class="ring ring-2" r="6" fill="none" stroke="#22d3ee" stroke-width="1.6"/>
                    <circle r="4.5" fill="#22d3ee"/>
                    <circle r="1.6" fill="#0f172a"/>
                </g>
                <g class="marker m-4" transform="translate(780 660)">
                    <circle class="ring ring-1" r="6" fill="none" stroke="#22d3ee" stroke-width="1.6"/>
                    <circle r="4.5" fill="#22d3ee"/>
                    <circle r="1.6" fill="#0f172a"/>
                </g>
                <g class="marker m-5" transform="translate(30 900)">
                    <circle class="ring ring-1" r="6" fill="none" stroke="#f97316" stroke-width="1.6"/>
                    <circle class="ring ring-2" r="6" fill="none" stroke="#f97316" stroke-width="1.6"/>
                    <circle r="4.5" fill="#f97316"/>
                    <circle r="1.6" fill="#0f172a"/>
                </g>
                <g class="marker m-6" transform="translate(780 980)">
                    <circle class="ring ring-1" r="6" fill="none" stroke="#f97316" stroke-width="1.6"/>
                    <circle r="4.5" fill="#f97316"/>
                    <circle r="1.6" fill="#0f172a"/>
                </g>
            </g>

            <g class="radar" transform="translate(420 600)">
                <circle class="radar-pulse rp-1" r="70" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
                <circle class="radar-pulse rp-2" r="70" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
                <circle class="radar-pulse rp-3" r="70" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
                <circle r="6" fill="#ffffff"/>
                <circle r="3" fill="#0b7a75"/>
            </g>

            <g class="coords" font-family="monospace" font-size="11" font-weight="700">
                <text class="coord coord-1" x="60" y="380" fill="rgba(255,255,255,0.55)">12.97° N · 77.59° E</text>
                <text class="coord coord-2" x="500" y="500" fill="rgba(255,255,255,0.45)">13.08° N · 80.27° E</text>
                <text class="coord coord-3" x="120" y="780" fill="rgba(255,255,255,0.5)">11.01° N · 76.96° E</text>
                <text class="coord coord-4" x="460" y="1020" fill="rgba(255,255,255,0.42)">19.07° N · 72.87° E</text>
            </g>

            <rect width="800" height="1200" fill="url(#vignette)"/>
        </svg>
    </div>

    <div class="login-intro">
        <div class="login-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s-7-7.5-7-13a7 7 0 0 1 14 0c0 5.5-7 13-7 13z"/>
                <circle cx="12" cy="9" r="2.6"/>
            </svg>
        </div>
        <h1>Driver Login</h1>
        <p>Sign in to start tracking your trips</p>
    </div>

    <div class="login-card">
        <form method="post" id="loginForm" class="login-form">
            <label class="login-field">
                <span class="login-field-label">Username</span>
                <div class="login-field-input">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
                    <input type="text" name="username" required autocomplete="username" placeholder="Enter your username">
                </div>
            </label>

            <label class="login-field">
                <span class="login-field-label">Password</span>
                <div class="login-field-input">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>
                    <input type="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
                </div>
            </label>

            <input type="hidden" name="login_lat" id="loginLat">
            <input type="hidden" name="login_lng" id="loginLng">

            <div class="login-note" id="locationPermissionMessage" data-state="info">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><circle cx="12" cy="16" r="0.6" fill="currentColor"/></svg>
                <span>Location permission is required for user login.</span>
            </div>

            <button type="submit" class="login-submit">
                <span>Login</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
        </form>
    </div>
</section>

<script>
    const loginForm = document.getElementById("loginForm");
    const loginLat = document.getElementById("loginLat");
    const loginLng = document.getElementById("loginLng");
    const locationPermissionMessage = document.getElementById("locationPermissionMessage");
    const locationPermissionText = locationPermissionMessage.querySelector("span");
    const usernameInput = loginForm.querySelector('input[name="username"]');
    const passwordInput = loginForm.querySelector('input[name="password"]');
    const savedLoginKey = "driverLoginSavedCredentials";
    const savedLoginDays = 7;
    let locationRequested = false;

    function loadSavedCredentials() {
        const savedValue = localStorage.getItem(savedLoginKey);
        if (!savedValue) {
            return;
        }

        try {
            const saved = JSON.parse(savedValue);
            if (!saved.expiresAt || Date.now() > saved.expiresAt) {
                localStorage.removeItem(savedLoginKey);
                return;
            }

            usernameInput.value = saved.username || "";
            passwordInput.value = saved.password || "";
        } catch {
            localStorage.removeItem(savedLoginKey);
        }
    }

    function saveCredentialsForSevenDays() {
        const expiresAt = Date.now() + savedLoginDays * 24 * 60 * 60 * 1000;
        localStorage.setItem(savedLoginKey, JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value,
            expiresAt: expiresAt
        }));
    }

    function setPermissionMessage(message, state) {
        locationPermissionText.textContent = message;
        locationPermissionMessage.dataset.state = state;
    }

    loginForm.addEventListener("submit", function (event) {
        saveCredentialsForSevenDays();

        if (locationRequested || loginLat.value) {
            return;
        }

        if (!("geolocation" in navigator)) {
            setPermissionMessage("Location is not available in this browser. User login requires location permission.", "error");
            return;
        }

        event.preventDefault();
        locationRequested = true;
        setPermissionMessage("Please allow location permission to continue login.", "pending");

        navigator.geolocation.getCurrentPosition(
            function (position) {
                loginLat.value = position.coords.latitude;
                loginLng.value = position.coords.longitude;
                setPermissionMessage("Location allowed. Logging in...", "success");
                loginForm.submit();
            },
            function () {
                setPermissionMessage("Please allow location permission to login.", "error");
                loginForm.submit();
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    });

    loadSavedCredentials();
</script>
{% endblock %}
