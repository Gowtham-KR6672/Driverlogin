{% extends "base.html" %}

{% block head_extra %}
<style>
    .topbar { display: none !important; }
    body { background: #0e5648 !important; }
    .container { max-width: none !important; padding: 0 !important; margin: 0 !important; }
</style>
{% endblock %}

{% block content %}
<section class="leaf-login-screen">
    <div class="leaf-illustration">
        <img src="{{ url_for('static', filename='leaf-bg.png') }}" alt="Tropical Leaves">
    </div>

    <div class="leaf-header">
        <h1>Driver Login</h1>
    </div>

    <form method="post" id="loginForm" class="leaf-form">
        <label class="leaf-field">
            <div class="leaf-field-input">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
                <input type="text" name="username" required autocomplete="username" placeholder="Username">
            </div>
        </label>

        <label class="leaf-field">
            <div class="leaf-field-input">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>
                <input type="password" name="password" required autocomplete="current-password" placeholder="Password">
            </div>
        </label>

        <input type="hidden" name="login_lat" id="loginLat">
        <input type="hidden" name="login_lng" id="loginLng">

        <button type="submit" class="leaf-submit">
            Login
        </button>

        <div class="leaf-note" id="locationPermissionMessage" data-state="info">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><circle cx="12" cy="16" r="0.6" fill="currentColor"/></svg>
            <span>Location permission is required for user login.</span>
        </div>
    </form>

    <div class="leaf-tracking-animation" aria-hidden="true">
        <svg viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
            <defs>
                <filter id="bottomGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="4" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            
            <g class="bottom-contours" stroke="#34d399" fill="none" opacity="0.12">
                <path d="M-100 150 Q 150 50 350 200 T 900 100" stroke-width="1" />
                <path d="M-100 250 Q 200 150 400 300 T 900 200" stroke-width="2" />
                <path d="M-100 350 Q 250 250 450 350 T 900 250" stroke-width="1" />
            </g>

            <path id="leafTrack1" d="M-100 250 Q 200 150 400 300 T 900 200" stroke="#10b981" stroke-width="2.5" fill="none" stroke-dasharray="8 12" opacity="0.3"/>
            <path id="leafTrack2" d="M-100 150 Q 150 50 350 200 T 900 100" stroke="#a3e635" stroke-width="1.5" fill="none" stroke-dasharray="4 8" opacity="0.2"/>

            <g filter="url(#bottomGlow)">
                <circle r="6" fill="#a3e635">
                    <animateMotion dur="12s" repeatCount="indefinite">
                        <mpath href="#leafTrack1"/>
                    </animateMotion>
                </circle>
                <circle r="3" fill="#ffffff">
                    <animateMotion dur="12s" repeatCount="indefinite">
                        <mpath href="#leafTrack1"/>
                    </animateMotion>
                </circle>

                <circle r="4" fill="#34d399">
                    <animateMotion dur="18s" repeatCount="indefinite" begin="2s">
                        <mpath href="#leafTrack2"/>
                    </animateMotion>
                </circle>

                <g transform="translate(650, 250)">
                    <circle r="20" fill="none" stroke="#a3e635" stroke-width="2">
                        <animate attributeName="r" values="5;30" dur="2.5s" repeatCount="indefinite" />
                        <animate attributeName="opacity" values="1;0" dur="2.5s" repeatCount="indefinite" />
                    </circle>
                    <circle r="30" fill="none" stroke="#a3e635" stroke-width="1">
                        <animate attributeName="r" values="10;45" dur="2.5s" repeatCount="indefinite" begin="1.25s"/>
                        <animate attributeName="opacity" values="0.8;0" dur="2.5s" repeatCount="indefinite" begin="1.25s"/>
                    </circle>
                    <circle r="6" fill="#a3e635" />
                    <circle r="2.5" fill="#ffffff" />
                </g>

                <g transform="translate(150, 115)">
                    <circle r="15" fill="none" stroke="#34d399" stroke-width="1.5">
                        <animate attributeName="r" values="4;20" dur="3s" repeatCount="indefinite" />
                        <animate attributeName="opacity" values="0.8;0" dur="3s" repeatCount="indefinite" />
                    </circle>
                    <circle r="4" fill="#34d399" />
                </g>
            </g>
        </svg>
    </div>
</section>

<script>
    const loginForm = document.getElementById("loginForm");
    const loginLat = document.getElementById("loginLat");
    const loginLng = document.getElementById("loginLng");
    const locationPermissionMessage = document.getElementById("locationPermissionMessage");
    const locationPermissionText = locationPermissionMessage.querySelector("span");
    const usernameInput = loginForm.querySelector('input[name="username"]');
    const passwordInput = loginForm.querySelector('input[name="password"]');
    const savedLoginKey = "driverLoginSavedCredentials";
    const savedLoginDays = 7;
    let locationRequested = false;

    function loadSavedCredentials() {
        const savedValue = localStorage.getItem(savedLoginKey);
        if (!savedValue) {
            return;
        }

        try {
            const saved = JSON.parse(savedValue);
            if (!saved.expiresAt || Date.now() > saved.expiresAt) {
                localStorage.removeItem(savedLoginKey);
                return;
            }

            usernameInput.value = saved.username || "";
            passwordInput.value = saved.password || "";
        } catch {
            localStorage.removeItem(savedLoginKey);
        }
    }

    function saveCredentialsForSevenDays() {
        const expiresAt = Date.now() + savedLoginDays * 24 * 60 * 60 * 1000;
        localStorage.setItem(savedLoginKey, JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value,
            expiresAt: expiresAt
        }));
    }

    function setPermissionMessage(message, state) {
        locationPermissionText.textContent = message;
        locationPermissionMessage.dataset.state = state;
    }

    loginForm.addEventListener("submit", function (event) {
        saveCredentialsForSevenDays();

        if (locationRequested || loginLat.value) {
            return;
        }

        if (!("geolocation" in navigator)) {
            setPermissionMessage("Location is not available in this browser. User login requires location permission.", "error");
            return;
        }

        event.preventDefault();
        locationRequested = true;
        setPermissionMessage("Please allow location permission to continue login.", "pending");

        navigator.geolocation.getCurrentPosition(
            function (position) {
                loginLat.value = position.coords.latitude;
                loginLng.value = position.coords.longitude;
                setPermissionMessage("Location allowed. Logging in...", "success");
                loginForm.submit();
            },
            function () {
                setPermissionMessage("Please allow location permission to login.", "error");
                loginForm.submit();
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    });

    loadSavedCredentials();
</script>
{% endblock %}
